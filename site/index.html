  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

dius:2px 2px 16px 16px;box-shadow:0 18px 40px -18px rgba(0,0,0,.9)\">\n        <div style=\"position:absolute;top:0;left:50%;transform:translateX(-50%);width:150px;height:9px;background:linear-gradient(180deg,#151517,#2a2b2e);border-radius:0 0 10px 10px\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- demo controls -->\n      <div style=\"display:flex;align-items:center;gap:12px;margin-top:30px;flex-wrap:wrap;justify-content:center\">\n        <button onclick=\"{{ trigLeft }}\" style=\"display:inline-flex;align-items:center;gap:8px;background:rgba(255,69,58,.14);border:1px solid rgba(255,69,58,.5);color:#ff6b62;font-size:13px;font-weight:600;padding:10px 20px;border-radius:999px;cursor:pointer;font-family:inherit\" style-hover=\"background:rgba(255,69,58,.24)\">\n          <span style=\"width:7px;height:7px;border-radius:50%;background:#FF453A;display:inline-block\"><\u002Fspan>Urgent review request<\u002Fbutton>\n        <button onclick=\"{{ trigRight }}\" style=\"display:inline-flex;align-items:center;gap:8px;background:rgba(255,159,10,.1);border:1px solid rgba(255,159,10,.45);color:#ffb340;font-size:13px;font-weight:600;padding:10px 20px;border-radius:999px;cursor:pointer;font-family:inherit\" style-hover=\"background:rgba(255,159,10,.2)\">\n          <span style=\"width:7px;height:7px;border-radius:50%;background:#FF9F0A;display:inline-block\"><\u002Fspan>Activity on your PR<\u002Fbutton>\n        <button onclick=\"{{ markReviewed }}\" style=\"display:inline-flex;align-items:center;gap:8px;background:rgba(48,209,88,.1);border:1px solid rgba(48,209,88,.45);color:#4ade74;font-size:13px;font-weight:600;padding:10px 20px;border-radius:999px;cursor:pointer;font-family:inherit\" style-hover=\"background:rgba(48,209,88,.2)\">Clear the queue<\u002Fbutton>\n        <button onclick=\"{{ toggSound }}\" style=\"display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.16);color:#a9a9b2;font-size:13px;font-weight:500;padding:10px 18px;border-radius:999px;cursor:pointer;font-family:inherit\" style-hover=\"background:rgba(255,255,255,.1)\">{{ soundLabel }}<\u002Fbutton>\n      <\u002Fdiv>\n      <p style=\"margin:12px 0 0;font-size:13px;color:#6d6d75\">Live demo — click either side of the notch: Review Requests on the left, Your PRs on the right.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FEATURES -->\n  <section style=\"max-width:1020px;margin:0 auto;padding:64px 28px;display:grid;grid-template-columns:repeat(3,1fr);gap:16px;box-sizing:border-box\">\n    <div style=\"background:#101114;border:1px solid rgba(255,255,255,.07);border-radius:18px;padding:26px;display:flex;flex-direction:column;gap:10px\">\n      <div style=\"font-size:12px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:#8a8a92\">Powered by gh<\u002Fdiv>\n      <div style=\"font-size:17px;font-weight:600;letter-spacing:-.01em\">Uses GH CLI<\u002Fdiv>\n      <p style=\"margin:0;font-size:14px;line-height:1.6;color:#9a9aa2;text-wrap:pretty\">Install and go, just have gh cli installed. <br><br>You can also set a github token for notch explicitly by placing it in ~/.config/git-notch/token - PAT or Classic token works fine<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"background:#101114;border:1px solid rgba(255,69,58,.25);border-radius:18px;padding:26px;display:flex;flex-direction:column;gap:10px\">\n      <div style=\"font-size:12px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:#FF453A\">Attention<\u002Fdiv>\n      <div style=\"font-size:17px;font-weight:600;letter-spacing:-.01em\">Loud only when it matters<\u002Fdiv>\n      <p style=\"margin:0;font-size:14px;line-height:1.6;color:#9a9aa2;text-wrap:pretty\">PRs labelled <span style=\"color: rgb(255, 107, 98); font-weight: 600;\">urgent<\u002Fspan> or <span style=\"color: rgb(255, 107, 98); font-weight: 600;\">blocker<\u002Fspan>, or opened with you as a reviewer, arrive with animation. And a sound for&nbsp;&nbsp;<span style=\"color: rgb(255, 107, 98); font-weight: 600;\">urgent&nbsp;<\u002Fspan>&nbsp;<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"background:#101114;border:1px solid rgba(255,255,255,.07);border-radius:18px;padding:26px;display:flex;flex-direction:column;gap:10px\">\n      <div style=\"font-size:12px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:#30D158\">Zero state<\u002Fdiv>\n      <div style=\"font-size:17px;font-weight:600;letter-spacing:-.01em\">Get to zero inbox<\u002Fdiv>\n      <p style=\"margin:0;font-size:14px;line-height:1.6;color:#9a9aa2;text-wrap:pretty\">Helps gamify the experience and get you down to zero inbox<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- INSTALL -->\n  <section style=\"max-width:680px;margin:0 auto;padding:24px 28px 80px;display:flex;flex-direction:column;gap:22px;box-sizing:border-box\">\n    <h2 style=\"margin:0;font-size:32px;font-weight:700;letter-spacing:-.025em;text-align:center\">Install in a minute<\u002Fh2>\n\n    <div style=\"display:flex;align-items:flex-start;gap:12px;background:rgba(255,159,10,.08);border:1px solid rgba(255,159,10,.4);border-radius:14px;padding:16px 18px\">\n      <svg viewBox=\"0 0 24 24\" width=\"18\" height=\"18\" fill=\"none\" stroke=\"#FF9F0A\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\" style=\"flex-shrink:0;margin-top:1px\"><path d=\"M12 9v4\"><\u002Fpath><path d=\"M12 17h.01\"><\u002Fpath><path d=\"M10.3 3.9 1.8 18.1a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z\"><\u002Fpath><\u002Fsvg>\n      <p style=\"margin:0;font-size:14px;line-height:1.55;color:#e8c98f\"><span style=\"font-family:ui-monospace,SF Mono,Menlo,monospace;font-weight:600;color:#ffd390\">brew install gh<\u002Fspan> required — the app reads your pull requests through the GitHub CLI. Install and authenticate it before first launch.<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"display:flex;flex-direction:column;gap:12px\">\n      <div style=\"display:flex;gap:16px;align-items:flex-start\">\n        <div style=\"width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#c9c9d0;flex-shrink:0\">1<\u002Fdiv>\n        <div style=\"flex:1;display:flex;flex-direction:column;gap:8px\">\n          <span style=\"font-size:15px;font-weight:600\">Install and authenticate the GitHub CLI<\u002Fspan>\n          <div style=\"background:#101114;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px 16px;font-family:ui-monospace,SF Mono,Menlo,monospace;font-size:13.5px;line-height:1.8;color:#c9c9d0\"><span style=\"color:#6d6d75\">$ <\u002Fspan>brew install gh<br><span style=\"color:#6d6d75\">$ <\u002Fspan>gh auth login<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:16px;align-items:flex-start\">\n        <div style=\"width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#c9c9d0;flex-shrink:0\">2<\u002Fdiv>\n        <div style=\"flex:1;display:flex;flex-direction:column;gap:4px\">\n          <span style=\"font-size:15px;font-weight:600\">Download GitHub Notch<\u002Fspan>\n          <p style=\"margin:0;font-size:14px;color:#9a9aa2;line-height:1.6\">Grab the latest <span style=\"font-family:ui-monospace,SF Mono,Menlo,monospace;font-size:13px;color:#c9c9d0\">.dmg<\u002Fspan> from the <a href=\"{{ releasesUrl }}\" style=\"color:#7db6ff;font-weight:600\" style-hover=\"color:#a3ccff\">GitHub releases page<\u002Fa> and drag it to Applications.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:16px;align-items:flex-start\">\n        <div style=\"width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#c9c9d0;flex-shrink:0\">3<\u002Fdiv>\n        <div style=\"flex:1;display:flex;flex-direction:column;gap:4px\">\n          <span style=\"font-size:15px;font-weight:600\">That's it — it lives in your notch<\u002Fspan>\n          <p style=\"margin:0;font-size:14px;color:#9a9aa2;line-height:1.6\">Review requests fill the left side, your PRs the right. When something urgent lands, you'll hear about it.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CTA -->\n  <section style=\"border-top:1px solid rgba(255,255,255,.07);padding:72px 28px;display:flex;flex-direction:column;align-items:center;gap:18px;text-align:center\">\n    <div style=\"width:64px;height:40px;background:#000;border-radius:0 0 16px 16px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 1px rgba(255,255,255,.14),0 12px 30px -10px rgba(0,0,0,.8)\">\n      <div style=\"width:20px;height:20px;color:#fff\"><svg viewBox=\"0 0 24 24\" width=\"100%\" height=\"100%\" fill=\"currentColor\" aria-hidden=\"true\"><path d=\"M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n    <\u002Fdiv>\n    <h2 style=\"margin:0;font-size:30px;font-weight:700;letter-spacing:-.025em\">Review faster<\u002Fh2>\n    <a href=\"{{ releasesUrl }}\" style=\"display:inline-flex;align-items:center;gap:9px;background:#FF453A;color:#ffffff;font-size:15px;font-weight:600;padding:13px 28px;border-radius:999px;box-shadow:0 8px 28px -8px rgba(255,69,58,.55)\" style-hover=\"background:#ff5b51;color:#ffffff\">\n      <svg viewBox=\"0 0 24 24\" width=\"16\" height=\"16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><path d=\"M12 3v12\"><\u002Fpath><path d=\"M6.5 10.5 12 16l5.5-5.5\"><\u002Fpath><path d=\"M4 20h16\"><\u002Fpath><\u002Fsvg>\n      Download<\u002Fa>\n    <span style=\"font-size:13px;color:#6d6d75\">Latest release on GitHub · macOS 13+<\u002Fspan>\n  <\u002Fsection>\n\n  <footer style=\"border-top:1px solid rgba(255,255,255,.07);padding:24px 28px;display:flex;justify-content:center;gap:8px;font-size:13px;color:#5a5a62\">\n    <span>GitHub Notch<\u002Fspan><span>·<\u002Fspan><a href=\"{{ releasesUrl }}\" style=\"color:#8a8a92\" style-hover=\"color:#e8e8ec\">Releases<\u002Fa><span>·<\u002Fspan><span>Requires the GitHub CLI<\u002Fspan>\n  <\u002Ffooter>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;releasesUrl&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;https://github.com/export-mike/git-notch/releases&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Links&quot;},&quot;accentRed&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#FF453A&quot;,&quot;options&quot;:[&quot;#FF453A&quot;,&quot;#FF3B30&quot;,&quot;#F85149&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Color&quot;},&quot;accentGreen&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#30D158&quot;,&quot;options&quot;:[&quot;#30D158&quot;,&quot;#34C759&quot;,&quot;#3FB950&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Color&quot;}}\">\nclass Component extends DCLogic {\n  state = { tab: 'open', leftOpen: false, rightOpen: false, leftAlert: false, rightAlert: false, leftDone: false, rightDone: false, soundOn: true, updated: 0 };\n  timers = [];\n  componentDidMount() {\n    this.tick = setInterval(() => this.setState(s => ({ updated: s.updated + 1 })), 1000);\n    // auto-demo: an urgent review request lands on the left shortly after load (silent — sound needs a gesture)\n    this.timers.push(setTimeout(() => this.setState({ leftAlert: true, leftOpen: true, updated: 0 }), 2200));\n  }\n  componentWillUnmount() { clearInterval(this.tick); this.timers.forEach(clearTimeout); }\n\n  chime(freqs) {\n    if (!this.state.soundOn) return;\n    try {\n      const ctx = this.actx || (this.actx = new (window.AudioContext || window.webkitAudioContext)());\n      if (ctx.state === 'suspended') ctx.resume();\n      const t = ctx.currentTime;\n      freqs.forEach((f, i) => {\n        const o = ctx.createOscillator(), g = ctx.createGain();\n        o.type = 'sine'; o.frequency.value = f;\n        g.gain.setValueAtTime(0, t + i * 0.13);\n        g.gain.linearRampToValueAtTime(0.16, t + i * 0.13 + 0.02);\n        g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.13 + 0.55);\n        o.connect(g); g.connect(ctx.destination);\n        o.start(t + i * 0.13); o.stop(t + i * 0.13 + 0.6);\n      });\n    } catch (e) {}\n  }\n\n  renderVals() {\n    const { tab, leftOpen, rightOpen, leftAlert, rightAlert, leftDone, rightDone, soundOn, updated } = this.state;\n    const RED = this.props.accentRed || '#FF453A';\n    const GREEN = this.props.accentGreen || '#30D158';\n    const releasesUrl = this.props.releasesUrl || 'https://github.com/export-mike/git-notch/releases';\n\n    const mkRow = (pr) => ({\n      ...pr,\n      dotStyle: { width: '8px', height: '8px', borderRadius: '50%', background: pr.dot, flexShrink: 0, marginTop: '7px' },\n      rowStyle: {\n        display: 'flex', gap: '12px', padding: '13px 18px', alignItems: 'flex-start',\n        borderBottom: '1px solid rgba(255,255,255,.06)',\n        ...(pr.urgent ? { animation: 'urgentshake .55s cubic-bezier(.36,.07,.19,.97), redglow 1.8s ease-in-out infinite', background: 'rgba(255,69,58,.06)' } : {}),\n      },\n    });\n\n    // ---- left: review requests ----\n    const urgentReview = { title: 'fix: rollback migration locking prod deploys', repo: 'acme/api #2,118', meta: 'Review requested · just now', labels: ['urgent', 'blocker'], dot: RED, urgent: true };\n    const reviewBase = [\n      { title: 'feat: rate-limit webhooks per installation', repo: 'acme/webhooks #341', meta: 'Review requested · 1 hr ago', dot: '#FFD60A', labels: [] },\n      { title: 'fix: null check on the payout schedule', repo: 'acme/api #2,102', meta: 'Review requested · 5 hrs ago', dot: '#FF9F0A', labels: [] },\n    ];\n    const reviews = (leftAlert && !leftDone) ? [urgentReview, ...reviewBase] : reviewBase;\n\n    // ---- right: your PRs ----\n    const activityPR = { title: 'fix: crash on empty cart at checkout', repo: 'acme/web #5,330', meta: 'Changes requested · just now', labels: ['blocker'], dot: RED, urgent: true };\n    const openBase = [\n      { title: 'feat: keyboard shortcuts for the command palette', repo: 'acme/desktop-app #482', meta: 'In review · 38 mins ago', dot: '#FFD60A', labels: [] },\n      { title: 'fix: debounce sync retries on flaky networks', repo: 'acme/sync-engine #1,207', meta: '2 unresolved comments · 3 hrs ago', dot: '#FF9F0A', labels: [] },\n    ];\n    const drafts = [\n      { title: 'refactor: split billing worker into queues', repo: 'acme/api #2,093', meta: 'CI failing · 26 mins ago', dot: RED, labels: [] },\n      { title: 'feat: usage export as CSV from the dashboard', repo: 'acme/desktop-app #468', meta: '4 unresolved comments · 2 days ago', dot: '#FF9F0A', labels: [] },\n      { title: 'fix: restrict analytics events to the allowlist', repo: 'acme/web #5,314', meta: 'Awaiting review · 3 days ago', dot: '#0A84FF', labels: [] },\n      { title: 'chore: remove legacy feature flags', repo: 'acme/api #2,051', meta: 'CI failing · 4 days ago', dot: RED, labels: [] },\n    ];\n    const open = (rightAlert && !rightDone) ? [activityPR, ...openBase] : openBase;\n    const rightList = tab === 'open' ? open : drafts;\n\n    // ---- notch badges (independent sides) ----\n    const NW = 220;\n    const mkBadge = (g, countRaw, shown, done) => {\n      const acc = done ? GREEN : RED;\n      const count = done ? '\\u2713' : String(countRaw);\n      const dx = g.corner.cx - g.badge.cx, dy = g.corner.cy - g.badge.cy;\n      return {\n        count,\n        dot: { position: 'absolute', left: g.badge.cx + 'px', top: g.badge.cy + 'px', minWidth: '15px', height: '15px', padding: '0 4px', boxSizing: 'border-box', borderRadius: '8px', background: acc, color: '#fff', fontSize: '9px', fontWeight: 700, lineHeight: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', transform: shown ? 'translate(-50%,-50%)' : `translate(-50%,-50%) translate(${dx}px,${dy}px)`, transition: 'transform 640ms cubic-bezier(.22,1,.36,1), background-color 500ms ease', boxShadow: '0 1px 3px rgba(0,0,0,.4), 0 0 0 1.5px rgba(0,0,0,.85)', zIndex: 5 },\n        oct: { position: 'absolute', left: g.oc.cx + 'px', top: g.oc.cy + 'px', width: '20px', height: '20px', color: '#fff', transform: shown ? 'translate(-50%,-50%)' : `translate(-50%,-50%) translateX(${g.from}px) scale(.9)`, opacity: shown ? 1 : 0, transition: 'transform 700ms cubic-bezier(.22,1,.36,1), opacity 500ms ease', zIndex: 4 },\n        ring: { position: 'absolute', left: g.oc.cx + 'px', top: g.oc.cy + 'px', width: '27px', height: '27px', boxSizing: 'border-box', border: '2px solid ' + acc, borderRadius: '50%', transform: `translate(-50%,-50%) scale(${shown ? 1 : 0.8})`, opacity: shown ? 1 : 0, transition: 'opacity 360ms ease, transform 700ms cubic-bezier(.22,1,.36,1), border-color 500ms ease', zIndex: 3 },\n        pulse: { position: 'absolute', left: g.oc.cx + 'px', top: g.oc.cy + 'px', width: '27px', height: '27px', boxSizing: 'border-box', border: '2px solid ' + acc, borderRadius: '50%', opacity: 0, animation: (shown && !done) ? 'sitepulse 1.9s cubic-bezier(.4,0,.2,1) infinite' : 'none', zIndex: 2 },\n      };\n    };\n    const L = mkBadge({ oc: { cx: 34, cy: 19 }, badge: { cx: 46, cy: 7 }, corner: { cx: 9, cy: 33 }, from: 24 }, reviews.length, leftAlert, leftDone);\n    const R = mkBadge({ oc: { cx: NW - 34, cy: 19 }, badge: { cx: NW - 46, cy: 7 }, corner: { cx: NW - 9, cy: 33 }, from: -24 }, open.length + drafts.length, rightAlert, rightDone);\n\n    const anyAlert = (leftAlert && !leftDone) || (rightAlert && !rightDone);\n    const notchStyle = { position: 'absolute', top: 0, left: '50%', transform: 'translateX(-50%)', width: NW + 'px', height: '38px', background: '#000', borderRadius: '0 0 13px 13px', zIndex: 20, boxShadow: '0 4px 14px -4px rgba(0,0,0,.6)', animation: anyAlert ? 'notchnudge .7s cubic-bezier(.22,1,.36,1)' : 'none', transformOrigin: 'top center' };\n\n    const panelBase = { position: 'absolute', top: '46px', left: '50%', width: '380px', background: 'rgba(14,15,17,.97)', borderRadius: '20px', border: '1px solid rgba(255,255,255,.09)', boxShadow: '0 30px 70px -20px rgba(0,0,0,.85)', zIndex: 19, color: '#e8e8ec', overflow: 'hidden', transition: 'transform 420ms cubic-bezier(.22,1,.36,1), opacity 300ms ease' };\n    const leftPanelStyle = { ...panelBase, left: 'clamp(12px, calc(50% - 450px), calc(50% - 450px))', transformOrigin: 'top right', transform: leftOpen ? 'translateY(0) scale(1)' : 'translateY(-8px) scale(.96)', opacity: leftOpen ? 1 : 0, pointerEvents: leftOpen ? 'auto' : 'none' };\n    const rightPanelStyle = { ...panelBase, left: 'auto', right: 'clamp(12px, calc(50% - 450px), calc(50% - 450px))', transformOrigin: 'top left', transform: rightOpen ? 'translateY(0) scale(1)' : 'translateY(-8px) scale(.96)', opacity: rightOpen ? 1 : 0, pointerEvents: rightOpen ? 'auto' : 'none' };\n\n    const tabBase = { border: 'none', cursor: 'pointer', fontFamily: 'inherit', fontSize: '13px', fontWeight: 600, padding: '7px 16px', borderRadius: '9px', background: 'transparent', color: 'rgba(255,255,255,.65)' };\n    const openTabStyle = { ...tabBase, ...(tab === 'open' ? { background: 'rgba(255,255,255,.14)', color: '#fff' } : {}) };\n    const draftTabStyle = { ...tabBase, ...(tab === 'draft' ? { background: 'rgba(255,255,255,.14)', color: '#fff' } : {}) };\n\n    const pill = (done, n) => ({ minWidth: '24px', height: '24px', padding: '0 8px', boxSizing: 'border-box', borderRadius: '12px', background: done ? GREEN : RED, color: '#fff', fontSize: '13px', fontWeight: 700, display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'background-color 400ms ease' });\n\n    return {\n      releasesUrl,\n      leftItems: reviews.map(mkRow), rightItems: rightList.map(mkRow),\n      L, R, notchStyle, leftPanelStyle, rightPanelStyle, openTabStyle, draftTabStyle,\n      leftPillStyle: pill(leftDone), rightPillStyle: pill(rightDone),\n      leftPillCount: reviews.length,\n      rightPillCount: tab === 'open' ? open.length : drafts.length,\n      openCount: open.length, draftCount: drafts.length,\n      updatedText: updated < 2 ? 'Updated just now' : `Updated ${updated} secs ago`,\n      soundLabel: soundOn ? 'Sound: on' : 'Sound: off',\n      toggLeft: () => this.setState(s => ({ leftOpen: !s.leftOpen, rightOpen: false })),\n      toggRight: () => this.setState(s => ({ rightOpen: !s.rightOpen, leftOpen: false })),\n      tabOpen: () => this.setState({ tab: 'open' }),\n      tabDraft: () => this.setState({ tab: 'draft' }),\n      trigLeft: () => { this.setState({ leftAlert: false, leftDone: false }, () => { setTimeout(() => { this.setState({ leftAlert: true, leftOpen: true, rightOpen: false, updated: 0 }); this.chime([880, 1174.7]); }, 60); }); },\n      trigRight: () => { this.setState({ rightAlert: false, rightDone: false }, () => { setTimeout(() => { this.setState({ rightAlert: true, rightOpen: true, leftOpen: false, tab: 'open', updated: 0 }); this.chime([659.3, 987.8]); }, 60); }); },\n      markReviewed: () => this.setState({ leftDone: true, rightDone: true, updated: 0 }),\n      toggSound: () => this.setState(s => ({ soundOn: !s.soundOn })),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
